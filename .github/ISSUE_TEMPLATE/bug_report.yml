name: Bug Report
description: Report a bug or unexpected behavior in the api-in-a-box
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: api-in-a-box Version
      description: Look at the pom.xml and paste the output here.
      placeholder: "e.g. 1.2.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: OS name and version (e.g. macOS 14.4, Ubuntu 22.04, Windows 11).
      placeholder: "e.g. macOS 14.4"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Create an new api-in-a-box with...
        2. Run `make build ...`
        3. See error
    validations:
      required: true
